{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product_detail</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">

    <link rel="stylesheet" href="{% static 'css/product_detail.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body>
    <h1>Product Details</h1>
    <div class="row product-box">
        <div class="col-lg-6 product_image">
            <img src="{{product.image.url}}" alt="Image" class="product-detail-image">
        </div>
        <div class="col-lg-6 detail-box">
            <h1>{{product.name}}</h1>
            <div class="product-rating">
                <div>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-regular fa-star"></i>
                </div>
                <h4>|</h4>
                <h4>120 reviews</h4>
            </div>
            <h1>{{product.price}}</h1>
            <p>{{product.description}}</p>
            <div class="cart-box">
                <div class="quantity-input">
                    <label>Quantity:</label>
                    <input type="number" value="1">
                </div>
                <button class="btn bg-primary text-white"><a href="{% url 'add_to_cart' product.id %}" class="text-decoration-none text-white">Add to Cart</a></button>
                <button class="btn bg-secondary text-white">Buy Now</button>
            </div>
        </div>
    </div>

    
    <h1>Related Products</h1>
    <div class="row temporary">
        <div class="col related-product">
            {% for product in related_products %}
                <div class="related-product-box">
                    <img src="{{ product.image.url }}" alt="image" width="100%" height="100px">
                    <p>{{product.name}}</p>
                    <h3>${{product.price}}</h3>
                </div>
            {% endfor %}
        </div>
    </div>

  <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>

</body>
</html>
