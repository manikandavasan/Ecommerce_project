{% load static %}

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cart</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}" />
    <link rel="stylesheet" href="{% static 'css/shopping_cart.css' %}" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <h1>Shopping Cart</h1>
    <div class="row overall-cart">
      <div class="col table-wrapper">
        <table class="cart_table">
          <tr>
            <th>Product</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Edit/Remove</th>
          </tr>
          {% for item in cart_items %}
          <tr>
            <td class="image-name">
              <img
                src="{{item.product.image.url}}"
                alt="image"
                height="150px"
                width="150px"
              />
              <h4>{{item.product.name}}</h4>
            </td>
            <td>{{item.product.price}}</td>
            <td>
              <form action="{% url 'update_cart' item.id %}" method="POST" class="update-cart-form">
                {% csrf_token %}
                <input type="number" name="quantity" value="{{item.quantity}}" min="1"
                />
                <button type="submit"class="btn bg-primary pt-1 pb-1 text-white">Update</button>
              </form>
            </td>
            <td>
              <a
                href="{% url 'delete_from_cart' item.id %}"
                class="text-decoration-none"
                >Delete<i class="fa-solid fa-trash"></i
              ></a>
            </td>
          </tr>
          {% endfor %}
        </table>
        <button class="btn bg-primary text-white m-3">Continue Shopping</button>
      </div>
      <div class="col">
        <table class="cart-summary">
          <tr>
            <th><h1>Cart Summary</h1></th>
          </tr>
          {% comment %}
          <tr>
            <td></td>
            <td></td>
          </tr>
          {% endcomment %}
          <tr>
            <td><h2>Total:{{total}}</h2></td>
          </tr>
          <tr>
            <td>
              <button class="btn bg-success text-white">
                <a href="{% url 'checkout_page' %}" class="text-decoration-none text-white">Proceed to Checkout</a>
              </button>
            </td>
          </tr>
        </table>
      </div>
    </div>
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
  </body>
</html>
