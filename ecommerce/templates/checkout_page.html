{% load static %}

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}" />
    <link rel="stylesheet" href="{% static 'css/checkout_page.css' %}" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>

    <div class="row m-0 container-fluid overall">
        <div class="col checkout-page">
            <h1>Checkout</h1>
            <div class="order-summary">
                <h3>Order Summary</h3>
                <table class="order-summary-table">
                  <tr>
                    <th>Product Name</th>
                  <th>Price</th>
                  </tr>
                  {% for item in cart_items %}
                  <tr>
                    <td>{{item.product.name}}</td>
                    <td>{{item.product.price}}</td>
                  </tr>
                  {% endfor %}
                </table>
                <h2>Total: {{total}}</h2>
            </div>

            <form action="" class="checkout-form">
                <h3>Shipping Information</h3>

                <input type="text" name="name" placeholder="Full Name" />
                <input type="text" name="address" placeholder="Address" />
                <input type="text" name="city" placeholder="City" />
                <input type="text" name="postalCode" placeholder="Postal Code" />
                <input type="text" name="PhoneNumber" placeholder="Phone Number" />
                <div class="billing">
                    <input type="checkbox" name="billingAddress"/>
                    <label>Same as Billing Address</label>
                </div>
                <h3>Payment Details</h3>
                <input type="text" name="cardNumber" placeholder="Card Number"/>
                <input type="date" name="expirydate" />
                <button class="btn bg-secondary text-white px-5 py-2"><a href="{% url 'place_order' %}" class="text-decoration-none text-white">Place Order</a></button>
                <a href="{% url 'home' %}" class="text-decoration-none">Continue Shopping >></a>
            </form>

        </div>
    </div>

    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
  </body>
</html>
